[main]
# The default PPD profile
default=balanced
battery_detection=true
# Follow /sys/firmware/acpi/platform_profile only when it matches the saved
# base profile, or when no explicit user profile is active yet. Set to true
# only if you rely on a hardware platform-profile switch (Fn key, etc.).
sysfs_acpi_monitor=false

[profiles]
# PPD = TuneD
power-saver=powersave
balanced=balanced
performance=throughput-performance

[battery]
# PPD = TuneD
balanced=balanced-battery
